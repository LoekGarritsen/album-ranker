services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: album-ranker-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8200}:8400"
    env_file: [.env]
    environment:
      - SPOTIFY_REDIRECT_URI=${SPOTIFY_REDIRECT_URI:-https://albums.garritsen.dev/api/spotify/callback}
      - FRONTEND_URL=${FRONTEND_URL:-https://albums.garritsen.dev}
    volumes:
      - ./data:/app/data
    networks:
      - album-ranker

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: album-ranker-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8201}:8401"
    depends_on:
      - backend
    networks:
      - album-ranker

networks:
  album-ranker:
    driver: bridge
