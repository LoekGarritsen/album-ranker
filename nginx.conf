server {
    listen 8401;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Content Security Policy - allow Spotify SDK and Cloudflare scripts
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://sdk.scdn.co https://*.cloudflare.com https://*.cloudflareinsights.com; connect-src 'self' https://api.spotify.com https://*.spotify.com wss://*.spotify.com ws: wss:; img-src 'self' data: https://*.scdn.co https://*.spotify.com https://i.scdn.co; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; frame-src 'self' https://sdk.scdn.co;" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # SPA routing - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache index.html - ensures users always get fresh asset references after deploys
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Proxy API requests to backend (with WebSocket support)
    location /api {
        proxy_pass http://backend:8400;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts for WebSocket
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Never cache service worker - ensures updates propagate immediately
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Cache hashed static assets (immutable because filenames change per build)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
