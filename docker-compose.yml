services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: album-ranker-backend
    restart: unless-stopped
    ports:
      - "8400:8400"
    environment:
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - SPOTIFY_REDIRECT_URI=${SPOTIFY_REDIRECT_URI:-https://albums.garritsen.online/api/spotify/callback}
    volumes:
      - ./data:/app/data
    networks:
      - album-ranker

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: album-ranker-frontend
    restart: unless-stopped
    ports:
      - "8401:8401"
    depends_on:
      - backend
    networks:
      - album-ranker

networks:
  album-ranker:
    driver: bridge
